version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sixpet
      POSTGRES_PASSWORD: w5lYyxpY1WA3U6rHSXvMZlPJ/kYQpESn9LrnqAtNsf8=
      POSTGRES_DB: sixpet_catalog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./storage:/app/storage
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build: .
    command: celery -A app.tasks.worker worker --loglevel=info
    volumes:
      - ./app:/app/app
      - ./storage:/app/storage
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio

  url-extractor:
    build: 
      context: ./url_extractor_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://sixpet:w5lYyxpY1WA3U6rHSXvMZlPJ%2FkYQpESn9LrnqAtNsf8%3D@postgres:5432/sixpet_catalog
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
