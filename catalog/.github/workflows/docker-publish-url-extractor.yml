name: Build and Push URL Extractor Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'url_extractor_service/**'
      - '.github/workflows/docker-publish-url-extractor.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'url_extractor_service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sxconnect/catalog-url-extractor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push URL Extractor Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./url_extractor_service
          file: ./url_extractor_service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max