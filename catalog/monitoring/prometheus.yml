global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # SixPet Catalog Engine
  - job_name: 'sixpet-catalog'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
    basic_auth:
      username: 'admin'
      password: 'metrics123'
    scrape_interval: 30s
    scrape_timeout: 10s
    
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # Node Exporter (opcional - para métricas do sistema)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']
  #   scrape_interval: 30s

# Alerting (opcional)
