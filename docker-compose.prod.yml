version: '3.8'

services:
  # Backend API
  catalog-api:
    image: ghcr.io/sxconnect/catalog-backend:latest
    container_name: sixpet-catalog-api
    restart: unless-stopped
    environment:
      # Database
      POSTGRES_HOST: catalog-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@catalog-postgres:5432/${POSTGRES_DB}
      
      # Redis
      REDIS_URL: redis://catalog-redis:6379/0
      
      # MinIO/S3
      MINIO_S3_DOMAIN: ${MINIO_S3_DOMAIN}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      
      # AI Services
      GROQ_API_KEYS: ${GROQ_API_KEYS}
      
      # App Config
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
      
      # CORS
      FRONTEND_URL: https://catalog.sxconnect.com.br
      
    depends_on:
      - catalog-postgres
      - catalog-redis
    networks:
      - catalog-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog-api.rule=Host(`catalog-api.sxconnect.com.br`)"
      - "traefik.http.routers.catalog-api.tls=true"
      - "traefik.http.routers.catalog-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.catalog-api.loadbalancer.server.port=8000"

  # Frontend
  catalog-frontend:
    image: ghcr.io/sxconnect/catalog-frontend:latest
    container_name: sixpet-catalog-frontend
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: https://catalog.sxconnect.com.br
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_URL: https://catalog-api.sxconnect.com.br
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - catalog-api
    networks:
      - catalog-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog-frontend.rule=Host(`catalog.sxconnect.com.br`)"
      - "traefik.http.routers.catalog-frontend.tls=true"
      - "traefik.http.routers.catalog-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.catalog-frontend.loadbalancer.server.port=3000"

  # PostgreSQL Database
  catalog-postgres:
    image: postgres:15-alpine
    container_name: sixpet-catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./catalog/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - catalog-network
    command: >
      postgres
      -c shared_preload_libraries=pg_trgm
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100

  # Redis Cache
  catalog-redis:
    image: redis:7-alpine
    container_name: sixpet-catalog-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - catalog-network

  # Celery Worker
  catalog-worker:
    image: ghcr.io/sxconnect/catalog-backend:latest
    container_name: sixpet-catalog-worker
    restart: unless-stopped
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=2
    environment:
      # Database
      POSTGRES_HOST: catalog-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@catalog-postgres:5432/${POSTGRES_DB}
      
      # Redis
      REDIS_URL: redis://catalog-redis:6379/0
      
      # MinIO/S3
      MINIO_S3_DOMAIN: ${MINIO_S3_DOMAIN}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      
      # AI Services
      GROQ_API_KEYS: ${GROQ_API_KEYS}
      
      # App Config
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
      
    depends_on:
      - catalog-postgres
      - catalog-redis
    networks:
      - catalog-network
    volumes:
      - ./catalog/storage:/app/storage

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  catalog-network:
    driver: bridge