version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sixpet-catalog-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sixpet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sixpet123}
      POSTGRES_DB: ${POSTGRES_DB:-sixpet_catalog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portainer_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sixpet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sixpet-catalog-redis
    restart: always
    networks:
      - portainer_default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sixpet-catalog-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - portainer_default
    labels:
      - traefik.enable=true
      # MinIO API
      - traefik.http.routers.minio-api.rule=Host(`minio-api.catalog.sxconnect.com.br`)
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls.certresolver=leresolver
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      # MinIO Console
      - traefik.http.routers.minio-console.rule=Host(`minio.catalog.sxconnect.com.br`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=leresolver
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

  api:
    image: ghcr.io/sxconnect/catalog:latest
    container_name: sixpet-catalog-api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sixpet}:${POSTGRES_PASSWORD:-sixpet123}@postgres:5432/${POSTGRES_DB:-sixpet_catalog}
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEYS=${GROQ_API_KEYS}
      - STORAGE_TYPE=${STORAGE_TYPE:-minio}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-sixpet-catalog}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_PUBLIC_URL=https://minio-api.catalog.sxconnect.com.br
    volumes:
      - catalog_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portainer_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.catalog-api.rule=Host(`catalog-api.sxconnect.com.br`)
      - traefik.http.routers.catalog-api.entrypoints=websecure
      - traefik.http.routers.catalog-api.tls.certresolver=leresolver
      - traefik.http.services.catalog-api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ghcr.io/sxconnect/catalog:latest
    container_name: sixpet-catalog-worker
    restart: always
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sixpet}:${POSTGRES_PASSWORD:-sixpet123}@postgres:5432/${POSTGRES_DB:-sixpet_catalog}
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEYS=${GROQ_API_KEYS}
      - STORAGE_TYPE=${STORAGE_TYPE:-minio}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-sixpet-catalog}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_PUBLIC_URL=https://minio-api.catalog.sxconnect.com.br
    volumes:
      - catalog_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portainer_default

volumes:
  postgres_data:
  minio_data:
  catalog_storage:

networks:
  portainer_default:
    external: true
